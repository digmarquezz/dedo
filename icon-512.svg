<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="g1" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#ff5e6c"/><stop offset="100%" stop-color="#ff5e6c"/></radialGradient>
    <radialGradient id="g2" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#4d96ff"/><stop offset="100%" stop-color="#4d96ff"/></radialGradient>
    <radialGradient id="g3" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#6bcb77"/><stop offset="100%" stop-color="#6bcb77"/></radialGradient>
    <radialGradient id="g4" cx="40%" cy="35%"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#ffd93d"/><stop offset="100%" stop-color="#ffd93d"/></radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%"><stop offset="0%" stop-color="#c86bff" stop-opacity="0.5"/><stop offset="100%" stop-color="#c86bff" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0a0f" rx="112"/>
  <rect x="27" y="27" width="458" height="458" rx="90" fill="none" stroke="#1f1f28" stroke-width="2.5"/>

  <!-- soft center glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- four finger orbs arranged like fingertips -->
  <circle cx="180" cy="200" r="58" fill="url(#g1)"/>
  <circle cx="180" cy="200" r="46" fill="none" stroke="#fff" stroke-opacity="0.4" stroke-width="3"/>

  <circle cx="332" cy="186" r="58" fill="url(#g2)"/>
  <circle cx="332" cy="186" r="46" fill="none" stroke="#fff" stroke-opacity="0.4" stroke-width="3"/>

  <circle cx="172" cy="330" r="58" fill="url(#g3)"/>
  <circle cx="172" cy="330" r="46" fill="none" stroke="#fff" stroke-opacity="0.4" stroke-width="3"/>

  <!-- winner (bigger, with crown dot) -->
  <circle cx="338" cy="332" r="72" fill="url(#g4)"/>
  <circle cx="338" cy="332" r="58" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="3.5"/>

  <!-- corner brackets -->
  <g stroke="#3a3a44" stroke-width="4" fill="none" stroke-linecap="square">
    <path d="M53 75 L53 53 L75 53"/><path d="M459 53 L437 53"/><path d="M459 75 L459 53"/>
    <path d="M53 437 L53 459 L75 459"/><path d="M459 459 L437 459"/><path d="M459 437 L459 459"/>
